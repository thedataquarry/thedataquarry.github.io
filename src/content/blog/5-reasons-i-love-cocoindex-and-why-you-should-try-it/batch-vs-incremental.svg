<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360">
  <title>Batch vs. incremental data freshness over time</title>
  <defs>
    <marker id="t" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#c7ccd0"/></marker>
  </defs>

  <rect x="0" y="0" width="760" height="360" rx="10" fill="#ffffff"/>

  <!-- ============ shared "new data" arrival lines (sporadic) ============ -->
  <g fill="#b9892f" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">
    <text x="140" y="34">new data</text>
    <text x="250" y="34">new data</text>
    <text x="470" y="34">new data</text>
    <text x="600" y="34">new data</text>
  </g>
  <g fill="#b9892f">
    <path d="M135,46 L145,46 L140,54 Z"/>
    <path d="M245,46 L255,46 L250,54 Z"/>
    <path d="M465,46 L475,46 L470,54 Z"/>
    <path d="M595,46 L605,46 L600,54 Z"/>
  </g>
  <g stroke="#b9892f" stroke-width="1.3" stroke-dasharray="3 3">
    <line x1="140" y1="54" x2="140" y2="320"/>
    <line x1="250" y1="54" x2="250" y2="320"/>
    <line x1="470" y1="54" x2="470" y2="320"/>
    <line x1="600" y1="54" x2="600" y2="320"/>
  </g>

  <!-- ============ TOP SUBPLOT: batch ============ -->
  <g fill="#9d3d30" fill-opacity="0.13">
    <rect x="140" y="60" width="200" height="130"/>
    <rect x="470" y="60" width="90"  height="130"/>
    <rect x="600" y="60" width="130" height="130"/>
  </g>
  <text x="240" y="82" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#9d3d30" text-anchor="middle">stale data</text>
  <line x1="90" y1="60" x2="90" y2="190" stroke="#c7ccd0" stroke-width="1.5"/>
  <line x1="90" y1="190" x2="730" y2="190" stroke="#e3e7ea" stroke-width="1.2"/>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="84" y="72"  font-size="10" text-anchor="end" fill="#9aa3a8">stale</text>
    <text x="84" y="193" font-size="10" text-anchor="end" fill="#9aa3a8">fresh</text>
    <text x="98" y="76"  font-size="13" font-weight="700" fill="#9d3d30">Batch</text>
  </g>
  <path d="M90,190 L140,190 L250,150 L340,90 L340,190 L470,190 L560,125 L560,190 L600,190 L730,120"
        fill="none" stroke="#9d3d30" stroke-width="2.5" stroke-linejoin="round"/>
  <g font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9aa3a8" text-anchor="middle">
    <text x="340" y="206">run</text>
    <text x="560" y="206">run</text>
  </g>

  <!-- ============ BOTTOM SUBPLOT: incremental (no stale zone) ============ -->
  <line x1="90" y1="240" x2="90" y2="320" stroke="#c7ccd0" stroke-width="1.5"/>
  <line x1="90" y1="320" x2="730" y2="320" stroke="#c7ccd0" stroke-width="1.5" marker-end="url(#t)"/>
  <g font-family="Inter, system-ui, sans-serif">
    <text x="84" y="252" font-size="10" text-anchor="end" fill="#cdd3d7">stale</text>
    <text x="84" y="322" font-size="10" text-anchor="end" fill="#9aa3a8">fresh</text>
    <text x="98" y="256" font-size="13" font-weight="700" fill="#0b6f6a">Incremental</text>
  </g>
  <!-- mostly flat at fresh, with a tiny blip of compute at each arrival -->
  <path d="M90,312 L134,312 L140,300 L146,312 L244,312 L250,300 L256,312 L464,312 L470,300 L476,312 L594,312 L600,300 L606,312 L730,312"
        fill="none" stroke="#0b6f6a" stroke-width="3" stroke-linejoin="round"/>
  <text x="98" y="340" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#9aa3a8">time →</text>
</svg>
