<svg xmlns="http://www.w3.org/2000/svg" width="760" height="350" viewBox="0 0 760 350">
  <title>Processing component granularity: coarse, medium, fine</title>
  <defs>
    <marker id="te" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#0b6f6a"/></marker>
    <marker id="fg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#c7ccd0"/></marker>
  </defs>

  <rect x="0" y="0" width="760" height="350" rx="10" fill="#ffffff"/>

  <g font-family="Inter, system-ui, sans-serif">
    <!-- granularity brackets (drawn first, behind nodes) -->
    <rect x="12" y="40" width="736" height="288" rx="12" fill="none" stroke="#9aa3a8" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="24" y="58" font-size="11" font-weight="700" fill="#9aa3a8">Coarse · all files</text>

    <rect x="26" y="70" width="596" height="140" rx="10" fill="none" stroke="#0b6f6a" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="36" y="87" font-size="11" font-weight="700" fill="#0b6f6a">Medium · per file</text>

    <rect x="188" y="92" width="440" height="44" rx="8" fill="none" stroke="#b9892f" stroke-width="1.4" stroke-dasharray="5 3"/>
    <text x="634" y="118" font-size="11" font-weight="700" fill="#b9892f">Fine · per chunk</text>

    <!-- file 1 nodes -->
    <rect x="40" y="108" width="96" height="40" rx="8" fill="#fff" stroke="#c7ccd0"/><text x="88" y="132" font-size="12" font-weight="600" text-anchor="middle" fill="#1c2429">report.pdf</text>
    <rect x="200" y="96" width="80" height="30" rx="7" fill="#fff" stroke="#c7ccd0"/><text x="240" y="116" font-size="11" text-anchor="middle" fill="#1c2429">chunk 1</text>
    <rect x="200" y="150" width="80" height="30" rx="7" fill="#fff" stroke="#c7ccd0"/><text x="240" y="170" font-size="11" text-anchor="middle" fill="#1c2429">chunk 2</text>
    <rect x="316" y="96" width="80" height="30" rx="7" fill="#eef7f5" stroke="#0b6f6a"/><text x="356" y="116" font-size="11" text-anchor="middle" fill="#0b6f6a">embed</text>
    <rect x="316" y="150" width="80" height="30" rx="7" fill="#eef7f5" stroke="#0b6f6a"/><text x="356" y="170" font-size="11" text-anchor="middle" fill="#0b6f6a">embed</text>
    <rect x="470" y="96" width="150" height="30" rx="7" fill="#fbeee0" stroke="#b9892f"/><text x="484" y="116" font-size="11" fill="#b9892f">row 1</text>
    <rect x="470" y="150" width="150" height="30" rx="7" fill="#fbeee0" stroke="#b9892f"/><text x="484" y="170" font-size="11" fill="#b9892f">row 2</text>

    <!-- file 1 edges -->
    <line x1="136" y1="124" x2="198" y2="111" stroke="#0b6f6a" stroke-width="2" marker-end="url(#te)"/>
    <line x1="136" y1="134" x2="198" y2="165" stroke="#0b6f6a" stroke-width="2" marker-end="url(#te)"/>
    <line x1="280" y1="111" x2="314" y2="111" stroke="#0b6f6a" stroke-width="2" marker-end="url(#te)"/>
    <line x1="280" y1="165" x2="314" y2="165" stroke="#0b6f6a" stroke-width="2" marker-end="url(#te)"/>
    <line x1="396" y1="111" x2="468" y2="111" stroke="#0b6f6a" stroke-width="2" marker-end="url(#te)"/>
    <line x1="396" y1="165" x2="468" y2="165" stroke="#0b6f6a" stroke-width="2" marker-end="url(#te)"/>

    <!-- file 2 (faded, implies "more files") -->
    <g opacity="0.5">
      <rect x="40" y="238" width="96" height="34" rx="8" fill="#fff" stroke="#c7ccd0"/><text x="88" y="260" font-size="12" text-anchor="middle" fill="#5f6b73">memo.pdf</text>
      <line x1="136" y1="255" x2="198" y2="255" stroke="#9aa3a8" stroke-width="1.6" marker-end="url(#fg)"/>
      <rect x="200" y="238" width="420" height="34" rx="7" fill="#f6f7f8" stroke="#d9dee2"/><text x="410" y="259" font-size="11" text-anchor="middle" fill="#9aa3a8">its own chunks → embeds → rows</text>
    </g>

    <!-- tradeoff note -->
    <text x="24" y="312" font-size="10.5" fill="#5f6b73">Smaller component → each piece syncs the moment it's ready and failures isolate · larger → more syncs as one unit.</text>
  </g>
</svg>
